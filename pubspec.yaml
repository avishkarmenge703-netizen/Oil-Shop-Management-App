name: oil_shop_management
description: Oil Shop Management with Velvex Coupon System
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0

  # State management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Models & serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Utilities
  intl: ^0.18.1
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  permission_handler: ^11.0.1

  # Scanning & OCR
  mobile_scanner: ^3.5.5
  google_ml_kit: ^0.16.0
  image_picker: ^1.0.5

  # PDF generation
  pdf: ^3.10.7
  printing: ^5.11.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
